name: Scheduled Integration Tests

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  integration-tests:
    name: Run Integration Tests on Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run integration tests
        id: integration_tests
        continue-on-error: true
        run: npm run test:e2e:integration
        env:
          BASE_URL: 'https://live-commerce-opal.vercel.app'
          ONEWMS_PARTNER_KEY: ${{ secrets.ONEWMS_PARTNER_KEY }}
          ONEWMS_DOMAIN_KEY: ${{ secrets.ONEWMS_DOMAIN_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/data/
          retention-days: 7

      - name: Create issue on failure
        if: steps.integration_tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read test results to get failure details
            let failureDetails = 'Integration tests failed. Check the workflow run for details.';

            try {
              // Try to parse Playwright HTML report data
              const reportDataPath = path.join(process.env.GITHUB_WORKSPACE, 'playwright-report', 'data');
              if (fs.existsSync(reportDataPath)) {
                failureDetails = 'See attached HTML report for detailed failure information.';
              }
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure,integration-test'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('Integration Tests Failed')
            );

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString();

            const issueBody = `## 🚨 Scheduled Integration Tests Failed

**Deployment URL:** https://live-commerce-opal.vercel.app
**Test Run:** ${runUrl}
**Timestamp:** ${timestamp}
**Workflow:** ${context.workflow}

### Failure Details

${failureDetails}

### Quick Links
- [View Workflow Run](${runUrl})
- [Download HTML Report](${runUrl}#artifacts)

### Next Steps
1. Review the HTML report for detailed failure information
2. Check if this is a flaky test or a real issue
3. Investigate ONEWMS API connectivity or database issues
4. Verify environment credentials are still valid

---
*This issue was automatically created by the scheduled integration test workflow.*
*It will be automatically closed when tests pass again.*`;

            if (existingIssue) {
              // Update existing issue with new run information
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### ⚠️ Tests still failing as of ${timestamp}\n\n[Latest run](${runUrl})`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Integration Tests Failed - Production Monitoring',
                body: issueBody,
                labels: ['test-failure', 'integration-test', 'needs-investigation']
              });
              console.log(`Created new issue #${issue.data.number}`);
            }

      - name: Close resolved issues
        if: steps.integration_tests.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Find and close any open test-failure issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure,integration-test'
            });

            const timestamp = new Date().toISOString();

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Tests are now passing as of ${timestamp}\n\nClosing this issue automatically.`
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });

              console.log(`Closed issue #${issue.number}`);
            }

      - name: Notify Slack on failure
        if: steps.integration_tests.outcome == 'failure' && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ Scheduled Integration Tests Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "⚠️ Scheduled Integration Tests Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\nProduction"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Timestamp:*\n${{ github.event.repository.updated_at }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Priority:*\nP1 - Monitor for pattern"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Integration tests detected issues with production. Check ONEWMS API connectivity and database access."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Fail workflow if tests failed
        if: steps.integration_tests.outcome == 'failure'
        run: exit 1
